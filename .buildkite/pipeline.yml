steps:
  - label: ":nix: Test Nix in Container"
    plugins:
      - docker#v5.11.0:
          image: "nixos/nix"
          command:
            - sh
            - -c
            - |
              echo "--- Checking Nix version"
              nix --version

              echo "--- Testing basic Nix evaluation"
              nix eval --expr '1 + 1'

              echo "✅ Nix container works!"
