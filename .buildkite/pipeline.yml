steps:
  - label: ":nix: Test Nix Installation (default-test)"
    agents:
      queue: "default-test"
    command: |
      echo "--- Checking if Nix is available"
      which nix

      echo "--- Checking Nix version"
      nix --version

      echo "--- Testing basic Nix evaluation"
      nix eval --expr '1 + 1'

      echo "✅ Nix is installed and working!"

  - label: ":nix: Test Nix Installation (graviton-test)"
    agents:
      queue: "graviton-test"
    command: |
      echo "--- Checking if Nix is available"
      which nix

      echo "--- Checking Nix version"
      nix --version

      echo "--- Testing basic Nix evaluation"
      nix eval --expr '1 + 1'

      echo "✅ Nix is installed and working!"
